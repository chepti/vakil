<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Palm body -->
  <ellipse cx="50" cy="63" rx="27" ry="25" fill="#c8a45a"/>

  <!-- Index finger -->
  <rect x="27" y="27" width="11" height="33" rx="5.5" fill="#c8a45a"/>
  <!-- Middle finger (tallest) -->
  <rect x="44" y="18" width="12" height="40" rx="6" fill="#c8a45a"/>
  <!-- Ring finger -->
  <rect x="62" y="27" width="11" height="33" rx="5.5" fill="#c8a45a"/>

  <!-- Thumb left -->
  <ellipse cx="19" cy="57" rx="7.5" ry="13" transform="rotate(-18 19 57)" fill="#c8a45a"/>
  <!-- Thumb right -->
  <ellipse cx="81" cy="57" rx="7.5" ry="13" transform="rotate(18 81 57)" fill="#c8a45a"/>

  <!-- Eye white -->
  <ellipse cx="50" cy="65" rx="9" ry="6" fill="white"/>
  <!-- Iris -->
  <circle cx="50" cy="65" r="4" fill="#1a4f8a"/>
  <!-- Pupil -->
  <circle cx="50" cy="65" r="2" fill="#0a1a3a"/>
  <!-- Highlight -->
  <circle cx="52" cy="63.5" r="1" fill="white"/>
</svg>
